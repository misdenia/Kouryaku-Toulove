<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!--设置网页字符编码为 UTF-8，支持中文 --> 
  <title>7-2编队计算器</title> 
  <!-- 网页标签页显示的标题 --> 
  <style type="text/css">
    h1 {font-family:'PingFang SC', 'SimHei', 'Microsoft YaHei', sans-serif; color:#004080;}
    h2 {font-family:'PingFang SC', 'SimHei', 'Microsoft YaHei', sans-serif; color:#004c99;}
    h3 {font-family:'PingFang SC', 'SimHei', 'Microsoft YaHei', sans-serif; color:#0059b3;}
    h4 {font-family:'PingFang SC', 'SimHei', 'Microsoft YaHei', sans-serif; color:#0066cc;}
    p {font-family:'PingFang SC', 'SimHei', 'Microsoft YaHei', sans-serif; color:#4775d1;}
    body {background: #e5f2ff;}
</style>

  <body>
    <h1>7-2 编队计算器</h1>
    <h2>编成</h2>
    <p>1. 任意刀种，极刀为宜（“老板位”）</p>
    <p>2. 【丙子椒林剑】</p>
    <p>3. 【日本号 极】</p>
    <p>4. 【蜻蛉切 极】</p>
    <p>5. 【御手杵 极】</p>
    <p>6. 极大太刀</p>
    <h2>动机</h2>
    <p>1. 王点不被中胁差先制（中盘苦无等级较高，先制难度大）</p>
    <p>2. 除丙子外其余队员掉花时大太刀仍在最后行动</p>
    <h2>让我们开始吧</h2>
    <p>请输入队长等级</p>
    <p>请输入丙子椒林剑等级</p>
    <p>请输入日本号等级</p>
    <p>请输入蜻蛉切等级</p>
    <p>请输入御手杵等级</p>
    <p>请输入极大太刀等级</p>
    
</body>
